version: 2
title: Prédiction de l'Énergie de Formation pour la Découverte de Nouveaux Matériaux
description: >
  Prédire l'énergie de formation (Ef) de structures cristallines à partir des
  positions 3D des atomes. Un matériau est stable si Ef est négative et basse.
  L'objectif est de remplacer la DFT (simulation quantique lente) par un modèle
  d'IA capable de prédire cette énergie en quelques millisecondes.
image: logo.png
registration_auto_approve: False  # if True, do not require approval from admin to join the comp

terms: pages/terms.md
pages:
  - title: Participation
    file: pages/participate.md
  - title: Seed
    file: pages/seed.md
  - title: Timeline
    file: pages/timeline.md

tasks:
  - index: 0
    name: Tâche de Développement
    description: 'Entraîner un modèle de régression sur les structures cristallines (positions 3D des atomes) pour prédire leur énergie de formation (eV/atome).'
    input_data: dev_phase/input_data/
    reference_data: dev_phase/reference_data/
    ingestion_program: ingestion_program/
    scoring_program: scoring_program/

solutions:
  - index: 0
    tasks:
    - 0
    path: solution/


phases:
  - name: Development Phase
    description: 'Phase de développement : affinez vos modèles sur les données d''entraînement et évaluez-les sur le jeu de test public.'
    start: 03-08-2026
    end: 09-31-2026
    tasks:
      - 0

leaderboards:
  - title: Results
    key: main
    columns:
      - title: Test MAE (eV/atome)
        key: test
        index: 0
        sorting: asc
      - title: Private Test MAE (eV/atome)
        key: private_test
        index: 1
        sorting: asc
        hidden: True
      - title: Train time
        key: train_time
        index: 2
        sorting: desc
      - title: Test time
        key: test_time
        index: 3
        sorting: desc
