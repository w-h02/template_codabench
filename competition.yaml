version: 2
title: Prédiction de l'Énergie de Formation pour la Découverte de Nouveaux Matériaux
description: >
  Predict the formation energy (Ef) of crystal structures from the 3D positions
  of their atoms. A material is stable when Ef is negative and low.
  The goal is to replace DFT (slow quantum simulation) with an AI model
  capable of predicting this energy in milliseconds.
image: logo.png
registration_auto_approve: False  # if True, do not require approval from admin to join the comp

terms: pages/terms.md
pages:
  - title: Participation
    file: pages/participate.md
  - title: Seed
    file: pages/seed.md
  - title: Timeline
    file: pages/timeline.md

tasks:
  - index: 0
    name: Development Task
    description: 'Train a regression model on crystal structures (3D atomic positions) to predict their formation energy (eV/atom).'
    input_data: dev_phase/input_data/
    reference_data: dev_phase/reference_data/
    ingestion_program: ingestion_program/
    scoring_program: scoring_program/

solutions:
  - index: 0
    tasks:
    - 0
    path: solution/


phases:
  - name: Development Phase
    description: 'Development phase: tune your models on training data and evaluate them on the public test set.'
    start: 03-08-2026
    end: 09-31-2026
    tasks:
      - 0

leaderboards:
  - title: Results
    key: main
    columns:
      - title: Test MAE (eV/atome)
        key: test
        index: 0
        sorting: asc
      - title: Private Test MAE (eV/atome)
        key: private_test
        index: 1
        sorting: asc
        hidden: True
      - title: Train time
        key: train_time
        index: 2
        sorting: desc
      - title: Test time
        key: test_time
        index: 3
        sorting: desc
